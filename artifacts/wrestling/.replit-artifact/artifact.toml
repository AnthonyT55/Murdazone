kind = "web"
previewPath = "/"
title = "Get Better at Wrestling"
version = "1.0.0"
id = "artifacts/wrestling"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21473

[services.development]
run = "pnpm --filter @workspace/wrestling run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wrestling", "run", "build" ]
publicDir = "artifacts/wrestling/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21473"
BASE_PATH = "/"
